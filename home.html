<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
    <title>Cálculo do IMC</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Cálculo do IMC</h2>
        </div>

        <div>
            <label for="">Altura (ex.: 1,70)</label>
            <br>
            <input type="text" id="altura" placeholder="Metros" maxlength="4">
            <br><br>
            
            <label for="">Peso (ex.: 69,2)</label>
            <br>
            <input type="text" id="peso" placeholder="Quilos" maxlength="5">

            <br><br>
            <p id="resultado">SEU IMC: </p>
            <br><br>

            <button onclick="CalcularIMC()" id="calcular">Calcular ></button>

            <button onclick="Limpar()" id="limpar">Limpar ></button>
            <br><br><br>

            <table>
                <div class="header-tabela">
                    <h4>VEJA A INTERPRETAÇÃO DO IMC</h4>
                </div>

                <tbody>
                    <tr id="titulo-tabela">
                        <td>IMC</td>
                        <td>CLASSIFICAÇÃO</td>
                        <td>OBESIDADE (GRAU)</td>
                    </tr>
                    <tr id="imc-magreza">
                        <td>MENOR QUE 18,5</td>
                        <td>MAGREZA</td>
                        <td>0</td>
                    </tr>
                    <tr id="imc-normal">
                        <td>ENTRE 18,5 E 24,9</td>
                        <td>NORMAL</td>
                        <td>0</td>
                    </tr>
                    <tr id="imc-sobrepeso">
                        <td>ENTRE 25,0 E 29,9</td>
                        <td>SOBREPESO</td>
                        <td>I</td>
                    </tr>
                    <tr id="imc-obesidade">
                        <td>ENTRE 30,0 E 39,9</td>
                        <td>OBESIDADE</td>
                        <td>II</td>
                    </tr>
                    <tr id="imc-obesidade-grave">
                        <td>MAIOR QUE 40,0</td>
                        <td>OBESIDADE GRAVE</td>
                        <td>III</td>
                    </tr>
                </tbody>
            </table>
            <br>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/b5bb1aed38.js" crossorigin="anonymous">
    </script>
    <script type="text/javascript" src="./js/jquery-3.6.1.js"></script>
    <script type="text/javascript" src="./js/jquery.mask.js"></script>

    <script src="./js/home.js"></script>
</body>
</html>
